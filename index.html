<!DOCTYPE html>
<html>
<head>
  <title>Car Wash CRM</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
  <h1>Car Wash CRM</h1>
</header>

<div class="filters">
  <input id="searchBox" placeholder="Search companies">

  <select id="priorityFilter">
    <option value="">All Priorities</option>
    <option value="5">Priority 5</option>
    <option value="4">Priority 4</option>
    <option value="3">Priority 3</option>
    <option value="2">Priority 2</option>
    <option value="1">Priority 1</option>
  </select>

  <select id="statusFilter">
    <option value="">All Statuses</option>
    <option>New</option>
    <option>Researching</option>
    <option>Ready for Outreach</option>
    <option>Contacted</option>
    <option>Follow-Up</option>
    <option>Meeting Set</option>
    <option>Not a Fit</option>
    <option>Do Not Contact</option>
  </select>
</div>

 <div class="dashboard">
  <div class="card">
    <h3 id="companyCount">0</h3>
    <p>Companies</p>
  </div>

  <div class="card">
    <h3 id="locationCount">0</h3>
    <p>Locations</p>
  </div>

  <div class="card">
    <h3 id="peCount">0</h3>
    <p>PE Backed</p>
  </div>

  <div class="card">
    <h3 id="followupCount">0</h3>
    <p>Follow Ups Due</p>
  </div>
</div> 
  
  <main>
    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Company</th>
            <th>Locations</th>
            <th>Priority</th>
            <th>PE Backed</th>
            <th>Status</th>
            <th>Next Follow Up</th>
          </tr>
        </thead>
        <tbody id="companyTable"></tbody>
      </table>
    </section>

    <aside id="detailPanel">
      <h2>Select a company</h2>
      <p>Company details will appear here.</p>
    </aside>
  </main>

  <script src="./app.js?v=10"></script>
</body>
</html>
